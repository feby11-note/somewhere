  <script>
  const track = document.querySelector('.carousel-track');

  // 複製三份
  const original = track.innerHTML;
  track.innerHTML = original + original + original;

  // 單份寬度（等 DOM 算完再抓）
  function getOneSetWidth() {
    const allCards = track.querySelectorAll('.char-card');
    const countPerSet = allCards.length / 3;
    let width = 0;
    for (let i = 0; i < countPerSet; i++) {
      const card = allCards[i];
      const style = getComputedStyle(card);
      width += card.offsetWidth + parseInt(style.marginRight || 0);
    }
    // 加上 gap（20px）* 張數
    width += 20 * (countPerSet - 1);
    return width;
  }

  let oneSetWidth = 0;

  window.addEventListener('load', () => {
    oneSetWidth = track.scrollWidth / 3;
    track.style.scrollBehavior = 'auto';
    track.scrollLeft = oneSetWidth;
    track.style.scrollBehavior = 'smooth';
  });

  // 箭頭
  function scrollCards(direction) {
    track.scrollBy({ left: direction * 320, behavior: 'smooth' });
  }

  // 無限循環
  track.addEventListener('scroll', () => {
    if (oneSetWidth === 0) return;

    if (track.scrollLeft >= oneSetWidth * 2) {
      track.style.scrollBehavior = 'auto';
      track.scrollLeft = oneSetWidth;
      track.style.scrollBehavior = 'smooth';
    }

    if (track.scrollLeft <= 0) {
      track.style.scrollBehavior = 'auto';
      track.scrollLeft = oneSetWidth;
      track.style.scrollBehavior = 'smooth';
    }
  });

  // 手機拖曳
  let isDown = false;
  let startX, sl;

  track.addEventListener('mousedown', (e) => {
    isDown = true;
    startX = e.pageX - track.offsetLeft;
    sl = track.scrollLeft;
    track.style.scrollBehavior = 'auto';
  });

  track.addEventListener('mouseleave', () => { isDown = false; });
  track.addEventListener('mouseup', () => {
    isDown = false;
    track.style.scrollBehavior = 'smooth';
  });

  track.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - track.offsetLeft;
    track.scrollLeft = sl - (x - startX) * 1.5;
  });
</script>
